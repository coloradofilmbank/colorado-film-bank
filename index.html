<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colorado Film Bank</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">

<div class="logo">
COLORADO FILM BANK
</div>

<div class="hero-content">
<h1>Colorado History Through Film</h1>

<p>
More than 6,200 searchable archival records documenting Colorado's
people, places, industries, landscapes, and cultural history.
</p>

<input
type="text"
id="q"
placeholder="Search collections, locations, films, photographs...">

</div>

</header>

<script>
document.getElementById('q').addEventListener('keypress', function(e){
if(e.key==='Enter'){
window.location='search.html?q='+encodeURIComponent(this.value);
}
});
<script src="script.js"></script>
