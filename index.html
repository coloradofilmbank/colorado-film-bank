<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Colorado Film Bank</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">
<h1>Colorado Film Bank</h1>
<p>6,201 searchable archival records</p>

<input
id="q"
placeholder="Search titles, collections, locations..."
autofocus>
</header>

<div class="container">

<h2>Featured Collections</h2>

<div class="grid">

<div class="card">
<a href="collections/stan-brakhage.html">
Stan Brakhage
<br>
1233 records
</a>
</div>

<div class="card">
<a href="collections/usafa.html">
USAFA
<br>
954 records
</a>
</div>

<div class="card">
<a href="collections/cloud-foundation.html">
Cloud Foundation
<br>
899 records
</a>
</div>

<div class="card">
<a href="collections/colorado-local-music.html">
Colorado Local Music
<br>
643 records
</a>
</div>

</div>

<h2>Recent Additions</h2>
<div id="recent"></div>

<h2>Search Results</h2>
<div id="results"></div>

</div>

<script>

let data=[];

fetch('catalog.json')
.then(r=>r.json())
.then(records=>{

data=records;

recent.innerHTML=records
.slice(0,20)
.map(r=>`
<div class="card">
<a href="${r.url}">${r.title}</a>
<br>
${r.collection}
</div>
`)
.join('');

});

q.oninput=function(){

let term=this.value.toLowerCase();

if(!term){
results.innerHTML='';
return;
}

let matches=data
.filter(r=>
JSON.stringify(r)
.toLowerCase()
.includes(term))
.slice(0,200);

results.innerHTML=matches.map(r=>`
<div class="card">
<a href="${r.url}">${r.title}</a>
<br>
${r.collection}
</div>
`).join('');

};

</script>

</body>
</html>
