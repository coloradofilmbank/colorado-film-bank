<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Search Results</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:40px;
  background:#f5f5f5;
}

h1{
  margin-bottom:20px;
}

.result{
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:8px;
}

.result a{
  text-decoration:none;
  color:#0b5fff;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>Search Results</h1>

<div id="results"></div>

<script>
const params = new URLSearchParams(window.location.search);
const q = (params.get('q') || '').toLowerCase();

fetch('catalog.json')
.then(r => r.json())
.then(data => {

const matches = data.filter(item =>
JSON.stringify(item).toLowerCase().includes(q)
);

const results = document.getElementById('results');

if(matches.length === 0){
results.innerHTML = '<p>No results found.</p>';
return;
}

results.innerHTML = matches.map(item => `
<div class="result">
<a href="${item.url}">
${item.title}
</a>
<br>
${item.collection}
</div>
`).join('');

});
</script>

</body>
</html>
