<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Colorado Film Bank Search</title>

<link rel="stylesheet" href="style.css">

<style>

.results{
max-width:1200px;
margin:auto;
padding:40px;
}

.card{
background:white;
color:black;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

.card h2{
margin-top:0;
}

.card a{
display:inline-block;
margin-top:15px;
padding:10px 20px;
background:#0b5fff;
color:white;
text-decoration:none;
border-radius:6px;
}

.meta{
color:#666;
margin-top:10px;
}

</style>

</head>

<body>

<div class="results">

  <nav class="topnav">

<div class="nav-logo">
    <a href="index.html">
        <img src="cfb logo.jpg" alt="Colorado Film Bank">
    </a>
</div>

</nav>

<h1>Colorado Film Bank Search Results</h1>

<div id="results"></div>

</div>

<script>

const params=new URLSearchParams(window.location.search);

const q=(params.get("q")||"").toLowerCase();

  document.body.insertAdjacentHTML(
"afterbegin",
`
<div style="
background:#14233a;
color:white;
padding:15px 30px;
font-size:20px;
text-align:center;
">
Archive Search: "${q}"
</div>
`
);

fetch("catalog.json")
.then(r=>r.json())
.then(data=>{

const matches = data.filter(item => {

const text = JSON.stringify(item).toLowerCase();

return text.includes(q);

});

const container=document.getElementById("results");

if(matches.length===0){

container.innerHTML="<h2>No results found.</h2>";

return;

}

container.innerHTML = matches.map((item,index) => `

<div class="card">

<h2>${item["TITLE OF MEDIA"]||""}</h2>

<div class="meta">
Collection: ${item["COLLECTION"]||""}
</div>

<div class="meta">
Location: ${item["LOCATION"]||""}
</div>

<a href="record.html?id=${index}">
View Record
</a>

</div>

`).join("");

});

</script>

</body>
</html>
